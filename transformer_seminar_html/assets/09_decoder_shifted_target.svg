<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 380" width="840" height="380"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect width="840" height="380" fill="#F8F9FB" rx="8"/>
  <text x="420" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">학습 시 Decoder 입력: Shifted Target (Teacher Forcing)</text>
  <text x="420" y="42" text-anchor="middle" font-size="10" fill="#6B7280">정답 문장을 오른쪽으로 한 칸 shift해 Decoder에 한 번에 넣는다</text>

  <!-- Target sentence label -->
  <text x="30" y="74" font-size="11" font-weight="700" fill="#374151">① 정답 Target 문장</text>
  <rect x="30" y="82" width="780" height="44" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <!-- 6 cells -->
  <line x1="160" y1="82" x2="160" y2="126" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="290" y1="82" x2="290" y2="126" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="420" y1="82" x2="420" y2="126" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="550" y1="82" x2="550" y2="126" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="680" y1="82" x2="680" y2="126" stroke="#FFFFFF" stroke-width="2"/>
  <text x="95"  y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">Le</text>
  <text x="225" y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">chat</text>
  <text x="355" y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">est</text>
  <text x="485" y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">sur</text>
  <text x="615" y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">le</text>
  <text x="745" y="109" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">tapis</text>

  <!-- Arrow: shift right -->
  <line x1="420" y1="134" x2="420" y2="152" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="147" font-size="10" fill="#9CA3AF">오른쪽으로 한 칸 shift + 앞에 &lt;SOS&gt; 추가</text>

  <!-- Decoder input label -->
  <text x="30" y="172" font-size="11" font-weight="700" fill="#374151">② Decoder 입력 (Shifted)</text>
  <rect x="30" y="180" width="780" height="44" rx="7" fill="#EDE9FE" stroke="#7C3AED" stroke-width="1.5"/>
  <line x1="160" y1="180" x2="160" y2="224" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="290" y1="180" x2="290" y2="224" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="420" y1="180" x2="420" y2="224" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="550" y1="180" x2="550" y2="224" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="680" y1="180" x2="680" y2="224" stroke="#FFFFFF" stroke-width="2"/>
  <text x="95"  y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">&lt;SOS&gt;</text>
  <text x="225" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">Le</text>
  <text x="355" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">chat</text>
  <text x="485" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">est</text>
  <text x="615" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">sur</text>
  <text x="745" y="207" text-anchor="middle" font-size="13" font-weight="700" fill="#7C3AED">le</text>

  <!-- Arrow down -->
  <line x1="420" y1="232" x2="420" y2="250" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="430" y="245" font-size="10" fill="#9CA3AF">Look-Ahead Mask 적용 후 Decoder 처리</text>

  <!-- Prediction target label -->
  <text x="30" y="270" font-size="11" font-weight="700" fill="#374151">③ Decoder가 예측해야 하는 Target</text>
  <rect x="30" y="278" width="780" height="44" rx="7" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <line x1="160" y1="278" x2="160" y2="322" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="290" y1="278" x2="290" y2="322" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="420" y1="278" x2="420" y2="322" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="550" y1="278" x2="550" y2="322" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="680" y1="278" x2="680" y2="322" stroke="#FFFFFF" stroke-width="2"/>
  <text x="95"  y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">Le</text>
  <text x="225" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">chat</text>
  <text x="355" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">est</text>
  <text x="485" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">sur</text>
  <text x="615" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">le</text>
  <text x="745" y="305" text-anchor="middle" font-size="13" font-weight="700" fill="#166534">tapis</text>

  <!-- Alignment arrows -->
  <line x1="95"  y1="224" x2="95"  y2="276" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="225" y1="224" x2="225" y2="276" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="355" y1="224" x2="355" y2="276" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="485" y1="224" x2="485" y2="276" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="615" y1="224" x2="615" y2="276" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <line x1="745" y1="224" x2="745" y2="276" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr)"/>

  <!-- Labels below arrows -->
  <text x="95"  y="338" text-anchor="middle" font-size="9" fill="#6B7280">&lt;SOS&gt;→Le</text>
  <text x="225" y="338" text-anchor="middle" font-size="9" fill="#6B7280">Le→chat</text>
  <text x="355" y="338" text-anchor="middle" font-size="9" fill="#6B7280">chat→est</text>
  <text x="485" y="338" text-anchor="middle" font-size="9" fill="#6B7280">est→sur</text>
  <text x="615" y="338" text-anchor="middle" font-size="9" fill="#6B7280">sur→le</text>
  <text x="745" y="338" text-anchor="middle" font-size="9" fill="#6B7280">le→tapis</text>

  <text x="420" y="368" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">모든 위치를 병렬 계산  |  Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
