<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" width="900" height="400"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect width="900" height="400" fill="#F8F9FB" rx="8"/>
  <text x="450" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Token → Embedding → Positional Encoding 흐름</text>

  <!-- ========= ROW 1: Input sentence ========= -->
  <text x="18" y="60" font-size="10" font-weight="600" fill="#6B7280">입력 문장</text>
  <rect x="18" y="66" width="862" height="36" rx="7" fill="#FFFFFF" stroke="#E4E9F0" stroke-width="1.5"/>
  <text x="449" y="89" text-anchor="middle" font-size="13" fill="#111827" font-weight="500">"The cat is on the mat."</text>

  <!-- Arrow down + label -->
  <line x1="449" y1="102" x2="449" y2="116" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="455" y="113" font-size="9" fill="#9CA3AF">Tokenizer</text>

  <!-- ========= ROW 2: Tokens ========= -->
  <text x="18" y="134" font-size="10" font-weight="600" fill="#6B7280">Tokens</text>

  <!-- 6 token boxes, each 120px wide, 12px gap, starting at x=90 -->
  <!-- Centers: 90+60=150, 150+132=282, 282+132=414, 414+132=546, 546+132=678, 678+132=810 -->
  <!-- Actually let me calculate: start=90, width=120, gap=14 → next_start = 90+120+14=224 -->
  <!-- 6 boxes: 90, 224, 358, 492, 626, 760 → ends at 760+120=880 -->
  <!-- That's 880 within 900. Good. -->

  <rect x="90" y="138" width="120" height="36" rx="7" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="150" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#1D4ED8">The</text>

  <rect x="224" y="138" width="120" height="36" rx="7" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="284" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#1D4ED8">cat</text>

  <rect x="358" y="138" width="120" height="36" rx="7" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="418" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#1D4ED8">is</text>

  <rect x="492" y="138" width="120" height="36" rx="7" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="552" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#1D4ED8">on</text>

  <rect x="626" y="138" width="120" height="36" rx="7" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="686" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#1D4ED8">the</text>

  <rect x="760" y="138" width="120" height="36" rx="7" fill="#EFF6FF" stroke="#BFDBFE" stroke-width="1.5"/>
  <text x="820" y="161" text-anchor="middle" font-size="13" font-weight="600" fill="#1D4ED8">mat</text>

  <!-- Arrows down -->
  <line x1="150" y1="174" x2="150" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="284" y1="174" x2="284" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="418" y1="174" x2="418" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="552" y1="174" x2="552" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="686" y1="174" x2="686" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="174" x2="820" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="455" y="185" font-size="9" fill="#9CA3AF" text-anchor="middle">Vocabulary에서 ID 조회</text>

  <!-- ========= ROW 3: Token IDs ========= -->
  <text x="18" y="208" font-size="10" font-weight="600" fill="#6B7280">Token IDs</text>

  <rect x="90" y="190" width="120" height="34" rx="6" fill="#F9FAFB" stroke="#E4E9F0" stroke-width="1.5"/>
  <text x="150" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">1</text>

  <rect x="224" y="190" width="120" height="34" rx="6" fill="#F9FAFB" stroke="#E4E9F0" stroke-width="1.5"/>
  <text x="284" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">5</text>

  <rect x="358" y="190" width="120" height="34" rx="6" fill="#F9FAFB" stroke="#E4E9F0" stroke-width="1.5"/>
  <text x="418" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">2</text>

  <rect x="492" y="190" width="120" height="34" rx="6" fill="#F9FAFB" stroke="#E4E9F0" stroke-width="1.5"/>
  <text x="552" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">6</text>

  <rect x="626" y="190" width="120" height="34" rx="6" fill="#F9FAFB" stroke="#E4E9F0" stroke-width="1.5"/>
  <text x="686" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">1</text>

  <rect x="760" y="190" width="120" height="34" rx="6" fill="#F9FAFB" stroke="#E4E9F0" stroke-width="1.5"/>
  <text x="820" y="212" text-anchor="middle" font-size="14" font-weight="700" fill="#374151">10</text>

  <!-- Note: The와 the가 같은 ID -->
  <text x="686" y="238" text-anchor="middle" font-size="8" fill="#DC2626">↑ 같은 ID</text>
  <text x="150" y="238" text-anchor="middle" font-size="8" fill="#DC2626">↑ 같은 ID</text>

  <!-- Arrows down -->
  <line x1="150" y1="243" x2="150" y2="257" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="284" y1="224" x2="284" y2="257" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="418" y1="224" x2="418" y2="257" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="552" y1="224" x2="552" y2="257" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="686" y1="243" x2="686" y2="257" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="820" y1="224" x2="820" y2="257" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="455" y="253" font-size="9" fill="#9CA3AF" text-anchor="middle">Embedding lookup table W_emb[id] → 512차원 벡터</text>

  <!-- ========= ROW 4: Embedding vectors ========= -->
  <text x="18" y="280" font-size="10" font-weight="600" fill="#6B7280">Embedding</text>

  <rect x="90" y="260" width="120" height="44" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="150" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">e_The</text>
  <text x="150" y="296" text-anchor="middle" font-size="8" fill="#16A34A">dim: 512</text>

  <rect x="224" y="260" width="120" height="44" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="284" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">e_cat</text>
  <text x="284" y="296" text-anchor="middle" font-size="8" fill="#16A34A">dim: 512</text>

  <rect x="358" y="260" width="120" height="44" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="418" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">e_is</text>
  <text x="418" y="296" text-anchor="middle" font-size="8" fill="#16A34A">dim: 512</text>

  <rect x="492" y="260" width="120" height="44" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="552" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">e_on</text>
  <text x="552" y="296" text-anchor="middle" font-size="8" fill="#16A34A">dim: 512</text>

  <rect x="626" y="260" width="120" height="44" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="686" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">e_the</text>
  <text x="686" y="296" text-anchor="middle" font-size="8" fill="#DC2626">= e_The !</text>

  <rect x="760" y="260" width="120" height="44" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="820" y="279" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">e_mat</text>
  <text x="820" y="296" text-anchor="middle" font-size="8" fill="#16A34A">dim: 512</text>

  <!-- "+ PE" symbols -->
  <text x="150" y="318" text-anchor="middle" font-size="14" fill="#7C3AED" font-weight="700">+PE₀</text>
  <text x="284" y="318" text-anchor="middle" font-size="14" fill="#7C3AED" font-weight="700">+PE₁</text>
  <text x="418" y="318" text-anchor="middle" font-size="14" fill="#7C3AED" font-weight="700">+PE₂</text>
  <text x="552" y="318" text-anchor="middle" font-size="14" fill="#7C3AED" font-weight="700">+PE₃</text>
  <text x="686" y="318" text-anchor="middle" font-size="14" fill="#7C3AED" font-weight="700">+PE₄</text>
  <text x="820" y="318" text-anchor="middle" font-size="14" fill="#7C3AED" font-weight="700">+PE₅</text>

  <!-- ========= ROW 5: Final output ========= -->
  <rect x="90" y="326" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="150" y="345" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">e_The+PE₀</text>
  <text x="150" y="360" text-anchor="middle" font-size="8" fill="#7C3AED">위치 반영됨</text>

  <rect x="224" y="326" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="284" y="345" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">e_cat+PE₁</text>
  <text x="284" y="360" text-anchor="middle" font-size="8" fill="#7C3AED">위치 반영됨</text>

  <rect x="358" y="326" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="418" y="345" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">e_is+PE₂</text>
  <text x="418" y="360" text-anchor="middle" font-size="8" fill="#7C3AED">위치 반영됨</text>

  <rect x="492" y="326" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="552" y="345" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">e_on+PE₃</text>
  <text x="552" y="360" text-anchor="middle" font-size="8" fill="#7C3AED">위치 반영됨</text>

  <rect x="626" y="326" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="686" y="345" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">e_the+PE₄</text>
  <text x="686" y="360" text-anchor="middle" font-size="8" fill="#16A34A">≠ e_The+PE₀</text>

  <rect x="760" y="326" width="120" height="44" rx="6" fill="#EDE9FE" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="820" y="345" text-anchor="middle" font-size="9" fill="#5B21B6" font-weight="600">e_mat+PE₅</text>
  <text x="820" y="360" text-anchor="middle" font-size="8" fill="#7C3AED">위치 반영됨</text>

  <!-- Shape label -->
  <text x="449" y="390" text-anchor="middle" font-size="10" fill="#374151">X ∈ ℝ^{6 × 512}  (seq_len × d_model)  → Encoder 입력</text>
</svg>
