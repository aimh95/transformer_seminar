<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 320" width="860" height="320"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect width="860" height="320" fill="#F8F9FB" rx="8"/>
  <text x="430" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Scaled Dot-Product Attention 계산 흐름</text>
  <text x="430" y="42" text-anchor="middle" font-size="10" fill="#6B7280">Attention(Q, K, V) = softmax( QKᵀ / √d_k ) · V</text>

  <!-- Step boxes: horizontal flow -->
  <!-- Q, K → MatMul → /√dk → Softmax → MatMul with V → Output -->

  <!-- Q box -->
  <rect x="18" y="110" width="70" height="50" rx="7" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="53" y="131" text-anchor="middle" font-size="16" font-weight="800" fill="#DC2626">Q</text>
  <text x="53" y="148" text-anchor="middle" font-size="8" fill="#EF4444">(seq, d_k)</text>

  <!-- K box -->
  <rect x="18" y="170" width="70" height="50" rx="7" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="53" y="191" text-anchor="middle" font-size="16" font-weight="800" fill="#1D4ED8">K</text>
  <text x="53" y="208" text-anchor="middle" font-size="8" fill="#3B82F6">(seq, d_k)</text>

  <!-- Arrow Q,K → MatMul -->
  <line x1="88" y1="135" x2="128" y2="162" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="88" y1="195" x2="128" y2="178" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 1: MatMul -->
  <rect x="130" y="140" width="110" height="50" rx="7" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="185" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">MatMul</text>
  <text x="185" y="178" text-anchor="middle" font-size="9" fill="#6B7280">QKᵀ</text>
  <text x="185" y="204" text-anchor="middle" font-size="8" fill="#9CA3AF">(seq, seq)</text>

  <!-- Arrow -->
  <line x1="240" y1="165" x2="268" y2="165" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 2: Scale -->
  <rect x="270" y="140" width="110" height="50" rx="7" fill="#F5F3FF" stroke="#C4B5FD" stroke-width="1.5"/>
  <text x="325" y="158" text-anchor="middle" font-size="11" font-weight="600" fill="#7C3AED">Scale</text>
  <text x="325" y="174" text-anchor="middle" font-size="11" fill="#7C3AED">/ √d_k</text>
  <text x="325" y="204" text-anchor="middle" font-size="8" fill="#9CA3AF">(seq, seq)</text>

  <!-- Arrow -->
  <line x1="380" y1="165" x2="408" y2="165" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Step 3: Optional Mask -->
  <rect x="390" y="54" width="118" height="36" rx="6" fill="#F9FAFB" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="449" y="70" text-anchor="middle" font-size="10" font-weight="600" fill="#4B5563">Mask</text>
  <text x="449" y="83" text-anchor="middle" font-size="8" fill="#6B7280">+Mask (0 or −∞)</text>
  <line x1="449" y1="90" x2="449" y2="138" stroke="#6B7280" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr)"/>
  <text x="456" y="120" font-size="8" fill="#9CA3AF">Decoder만 적용</text>

  <!-- Step 4: Softmax -->
  <rect x="410" y="140" width="110" height="50" rx="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="465" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Softmax</text>
  <text x="465" y="178" text-anchor="middle" font-size="9" fill="#92400E">dim=-1 (row별)</text>
  <text x="465" y="204" text-anchor="middle" font-size="8" fill="#9CA3AF">각 row 합 = 1.0</text>

  <!-- Arrow + V -->
  <line x1="520" y1="165" x2="548" y2="165" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- V box -->
  <rect x="550" y="170" width="70" height="50" rx="7" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="585" y="191" text-anchor="middle" font-size="16" font-weight="800" fill="#16A34A">V</text>
  <text x="585" y="208" text-anchor="middle" font-size="8" fill="#22C55E">(seq, d_v)</text>

  <!-- Arrow softmax → MatMul with V -->
  <line x1="585" y1="170" x2="585" y2="152" stroke="#374151" stroke-width="1.5"/>
  <line x1="585" y1="152" x2="632" y2="152" stroke="#374151" stroke-width="1.5"/>

  <!-- Step 5: MatMul with V -->
  <rect x="634" y="140" width="110" height="50" rx="7" fill="#F0FDF4" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="689" y="162" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">MatMul</text>
  <text x="689" y="178" text-anchor="middle" font-size="9" fill="#166534">Att.Weight × V</text>
  <text x="689" y="204" text-anchor="middle" font-size="8" fill="#9CA3AF">(seq, d_v)</text>

  <!-- Arrow → Output -->
  <line x1="744" y1="165" x2="772" y2="165" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="774" y="140" width="70" height="50" rx="7" fill="#DCFCE7" stroke="#16A34A" stroke-width="2"/>
  <text x="809" y="162" text-anchor="middle" font-size="12" font-weight="700" fill="#15803D">Out</text>
  <text x="809" y="178" text-anchor="middle" font-size="8" fill="#16A34A">(seq, d_v)</text>

  <!-- Bottom explanation boxes -->
  <rect x="130" y="218" width="110" height="52" rx="5" fill="#FFFFFF" stroke="#E4E9F0" stroke-width="1"/>
  <text x="185" y="234" text-anchor="middle" font-size="9" fill="#374151" font-weight="600">① 유사도 계산</text>
  <text x="185" y="249" text-anchor="middle" font-size="8" fill="#6B7280">q_i · k_j 내적으로</text>
  <text x="185" y="261" text-anchor="middle" font-size="8" fill="#6B7280">얼마나 관련있는지</text>

  <rect x="270" y="218" width="110" height="52" rx="5" fill="#FFFFFF" stroke="#E4E9F0" stroke-width="1"/>
  <text x="325" y="234" text-anchor="middle" font-size="9" fill="#374151" font-weight="600">② 스케일 조정</text>
  <text x="325" y="249" text-anchor="middle" font-size="8" fill="#6B7280">d_k가 크면 분산이</text>
  <text x="325" y="261" text-anchor="middle" font-size="8" fill="#6B7280">커지므로 √d_k로 보정</text>

  <rect x="410" y="218" width="110" height="52" rx="5" fill="#FFFFFF" stroke="#E4E9F0" stroke-width="1"/>
  <text x="465" y="234" text-anchor="middle" font-size="9" fill="#374151" font-weight="600">③ 확률화</text>
  <text x="465" y="249" text-anchor="middle" font-size="8" fill="#6B7280">각 row 합 = 1이 되는</text>
  <text x="465" y="261" text-anchor="middle" font-size="8" fill="#6B7280">참고 비율로 변환</text>

  <rect x="634" y="218" width="110" height="52" rx="5" fill="#FFFFFF" stroke="#E4E9F0" stroke-width="1"/>
  <text x="689" y="234" text-anchor="middle" font-size="9" fill="#374151" font-weight="600">④ 정보 취합</text>
  <text x="689" y="249" text-anchor="middle" font-size="8" fill="#6B7280">비율에 따라 Value</text>
  <text x="689" y="261" text-anchor="middle" font-size="8" fill="#6B7280">정보를 가중합</text>

  <!-- Step numbers -->
  <circle cx="185" cy="130" r="10" fill="#374151"/>
  <text x="185" y="135" text-anchor="middle" font-size="10" fill="white" font-weight="700">1</text>
  <circle cx="325" cy="130" r="10" fill="#7C3AED"/>
  <text x="325" y="135" text-anchor="middle" font-size="10" fill="white" font-weight="700">2</text>
  <circle cx="465" cy="130" r="10" fill="#D97706"/>
  <text x="465" y="135" text-anchor="middle" font-size="10" fill="white" font-weight="700">3</text>
  <circle cx="689" cy="130" r="10" fill="#16A34A"/>
  <text x="689" y="135" text-anchor="middle" font-size="10" fill="white" font-weight="700">4</text>

  <text x="430" y="306" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
