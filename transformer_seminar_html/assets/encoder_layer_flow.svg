<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 500" width="560" height="500"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arr-b" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#1D4ED8"/>
    </marker>
  </defs>

  <rect width="560" height="500" fill="#F8F9FB" rx="8"/>
  <text x="280" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Encoder Layer 내부 구조</text>

  <!-- Input X -->
  <rect x="140" y="42" width="280" height="38" rx="7" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="280" y="58" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="600">입력 X</text>
  <text x="280" y="73" text-anchor="middle" font-size="9" fill="#3B82F6">shape: (seq_len, d_model)  예: (6, 512)</text>

  <!-- Arrow + residual branch -->
  <line x1="280" y1="80" x2="280" y2="100" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Residual branch 1: left side -->
  <line x1="140" y1="62" x2="64" y2="62" stroke="#1D4ED8" stroke-width="1.5"/>
  <line x1="64" y1="62" x2="64" y2="218" stroke="#1D4ED8" stroke-width="1.5"/>
  <line x1="64" y1="218" x2="138" y2="218" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <text x="50" y="145" text-anchor="middle" font-size="9" fill="#2563EB" transform="rotate(-90,50,145)">Residual (x)</text>

  <!-- MHA -->
  <rect x="140" y="102" width="280" height="42" rx="7" fill="#BFDBFE" stroke="#3B82F6" stroke-width="2"/>
  <text x="280" y="121" text-anchor="middle" font-size="12" font-weight="700" fill="#1E3A8A">Multi-Head Self-Attention</text>
  <text x="280" y="137" text-anchor="middle" font-size="9" fill="#1D4ED8">모든 token이 서로를 참고  |  Q,K,V ← X</text>

  <!-- Add & Norm 1 -->
  <line x1="280" y1="144" x2="280" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="286" y="157" font-size="9" fill="#9CA3AF">+x (residual)</text>
  <rect x="150" y="162" width="260" height="32" rx="6" fill="#F0F9FF" stroke="#BAE6FD" stroke-width="1.5"/>
  <text x="280" y="181" text-anchor="middle" font-size="11" fill="#0369A1">Add &amp; Norm</text>
  <text x="280" y="192" text-anchor="middle" font-size="8" fill="#0284C7">LayerNorm(x + SubLayer(x))</text>

  <!-- Arrow + residual branch 2 -->
  <line x1="280" y1="194" x2="280" y2="214" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Residual branch 2: right side -->
  <line x1="420" y1="178" x2="494" y2="178" stroke="#D97706" stroke-width="1.5"/>
  <line x1="494" y1="178" x2="494" y2="336" stroke="#D97706" stroke-width="1.5"/>
  <line x1="494" y1="336" x2="420" y2="336" stroke="#D97706" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="510" y="262" text-anchor="middle" font-size="9" fill="#D97706" transform="rotate(90,510,262)">Residual (x)</text>

  <!-- FFN -->
  <rect x="140" y="216" width="280" height="54" rx="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="280" y="237" text-anchor="middle" font-size="12" font-weight="700" fill="#78350F">Feed Forward Network</text>
  <text x="280" y="253" text-anchor="middle" font-size="9" fill="#92400E">각 token 독립 처리  (d_model→d_ff→d_model)</text>
  <text x="280" y="264" text-anchor="middle" font-size="9" fill="#92400E">token 간 정보 섞음 없음</text>

  <!-- Add & Norm 2 -->
  <line x1="280" y1="270" x2="280" y2="286" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="286" y="283" font-size="9" fill="#9CA3AF">+prev (residual)</text>
  <rect x="150" y="288" width="260" height="32" rx="6" fill="#FFF7ED" stroke="#FED7AA" stroke-width="1.5"/>
  <text x="280" y="307" text-anchor="middle" font-size="11" fill="#C2410C">Add &amp; Norm</text>
  <text x="280" y="318" text-anchor="middle" font-size="8" fill="#EA580C">LayerNorm(x + FFN(x))</text>

  <!-- Output -->
  <line x1="280" y1="320" x2="280" y2="350" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="286" y="343" font-size="9" fill="#9CA3AF">(seq_len, d_model)</text>
  <rect x="140" y="352" width="280" height="38" rx="7" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="280" y="368" text-anchor="middle" font-size="12" fill="#1D4ED8" font-weight="600">출력 (다음 Encoder Layer로)</text>
  <text x="280" y="382" text-anchor="middle" font-size="9" fill="#3B82F6">shape: (seq_len, d_model)  ← 입력과 동일</text>

  <!-- × 6 annotation -->
  <rect x="48" y="414" width="464" height="52" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="280" y="436" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">이 구조가 6번 반복된다 (Encoder Layer × 6)</text>
  <text x="280" y="454" text-anchor="middle" font-size="10" fill="#92400E">각 layer는 자신만의 W^Q, W^K, W^V, W₁, W₂를 가진다</text>

  <text x="280" y="490" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
