<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 220" width="960" height="220"
     font-family="system-ui,-apple-system,'Segoe UI',sans-serif">
  <rect width="960" height="220" fill="#F8FAFC" rx="10"/>

  <!-- Title -->
  <text x="480" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">LLM 입력 → 출력 흐름 요약</text>

  <!-- Boxes -->
  <!-- 1. Input -->
  <rect x="20" y="50" width="130" height="64" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="85" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">① 입력 문장</text>
  <text x="85" y="95" text-anchor="middle" font-size="10" fill="#1E40AF">"The cat is</text>
  <text x="85" y="108" text-anchor="middle" font-size="10" fill="#1E40AF">on the mat."</text>

  <!-- Arrow -->
  <line x1="153" y1="82" x2="172" y2="82" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0,7 3,0 6" fill="#6B7280"/>
    </marker>
  </defs>

  <!-- 2. Tokenizer -->
  <rect x="175" y="50" width="120" height="64" rx="8" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="235" y="77" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">② Tokenizer</text>
  <text x="235" y="93" text-anchor="middle" font-size="9.5" fill="#6B7280">["The","cat","is"…]</text>
  <text x="235" y="107" text-anchor="middle" font-size="9.5" fill="#6B7280">→ [1,5,2,6,1,10]</text>

  <!-- Arrow -->
  <line x1="298" y1="82" x2="317" y2="82" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 3. Embedding + PE -->
  <rect x="320" y="50" width="130" height="64" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="1.5"/>
  <text x="385" y="71" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">③ Embedding</text>
  <text x="385" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">+ Position</text>
  <text x="385" y="104" text-anchor="middle" font-size="9.5" fill="#7C3AED">id → vector + 위치</text>

  <!-- Arrow -->
  <line x1="453" y1="82" x2="472" y2="82" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 4. Encoder -->
  <rect x="475" y="38" width="110" height="88" rx="8" fill="#EFF6FF" stroke="#2563EB" stroke-width="2.5"/>
  <text x="530" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#1D4ED8">④ Encoder</text>
  <text x="530" y="84" text-anchor="middle" font-size="9.5" fill="#1E40AF">× 6 Layer</text>
  <text x="530" y="100" text-anchor="middle" font-size="9.5" fill="#1E40AF">H_enc 생성</text>

  <!-- Arrow -->
  <line x1="588" y1="82" x2="607" y2="82" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 5. Decoder -->
  <rect x="610" y="38" width="110" height="88" rx="8" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2.5"/>
  <text x="665" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#5B21B6">⑤ Decoder</text>
  <text x="665" y="84" text-anchor="middle" font-size="9.5" fill="#6D28D9">× 6 Layer</text>
  <text x="665" y="100" text-anchor="middle" font-size="9.5" fill="#6D28D9">token씩 예측</text>

  <!-- Arrow -->
  <line x1="723" y1="82" x2="742" y2="82" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 6. Linear + Softmax -->
  <rect x="745" y="50" width="90" height="64" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="1.5"/>
  <text x="790" y="74" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">⑥ Linear</text>
  <text x="790" y="88" text-anchor="middle" font-size="10" font-weight="700" fill="#065F46">+ Softmax</text>
  <text x="790" y="104" text-anchor="middle" font-size="9" fill="#059669">확률 분포</text>

  <!-- Arrow -->
  <line x1="838" y1="82" x2="857" y2="82" stroke="#6B7280" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- 7. Output -->
  <rect x="860" y="50" width="82" height="64" rx="8" fill="#DCFCE7" stroke="#22C55E" stroke-width="2"/>
  <text x="901" y="73" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">"Le chat</text>
  <text x="901" y="87" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">est sur</text>
  <text x="901" y="101" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">le tapis."</text>

  <!-- Bottom note -->
  <text x="480" y="148" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Transformer는 입력 문장을 한 번에 읽고, Decoder가 출력 문장을 한 token씩 생성합니다.</text>
  <text x="480" y="166" text-anchor="middle" font-size="10.5" fill="#6B7280">Encoder는 문맥을 이해하고(H_enc), Decoder는 그 정보를 참고해 다음 token을 예측합니다.</text>
  <text x="480" y="182" text-anchor="middle" font-size="10.5" fill="#6B7280">즉, 입력 → 이해 → 한 token씩 생성의 흐름으로 동작합니다.</text>

  <text x="480" y="210" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
