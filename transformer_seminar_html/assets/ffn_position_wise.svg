<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 400" width="860" height="400"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect width="860" height="400" fill="#F8F9FB" rx="8"/>
  <text x="430" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Position-wise Feed Forward Network (FFN)</text>
  <text x="430" y="42" text-anchor="middle" font-size="10" fill="#6B7280">각 토큰을 독립적으로 처리  |  FFN(x) = max(0, xW₁ + b₁)W₂ + b₂</text>

  <!-- Left: Token-wise illustration (3 tokens processed independently) -->
  <text x="170" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">토큰별 독립 처리</text>

  <!-- Token 1 -->
  <rect x="28" y="74" width="80" height="28" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="68" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">The [d=512]</text>
  <line x1="108" y1="88" x2="126" y2="88" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="128" y="74" width="74" height="28" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="165" y="92" text-anchor="middle" font-size="10" fill="#78350F">FFN(·)</text>
  <line x1="202" y1="88" x2="220" y2="88" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="222" y="74" width="82" height="28" rx="5" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="263" y="92" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">The' [d=512]</text>

  <!-- Token 2 -->
  <rect x="28" y="116" width="80" height="28" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="68" y="134" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">cat [d=512]</text>
  <line x1="108" y1="130" x2="126" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="128" y="116" width="74" height="28" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="165" y="134" text-anchor="middle" font-size="10" fill="#78350F">FFN(·)</text>
  <line x1="202" y1="130" x2="220" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="222" y="116" width="82" height="28" rx="5" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="263" y="134" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">cat' [d=512]</text>

  <!-- Token 3 (dots below) -->
  <text x="68" y="164" text-anchor="middle" font-size="16" fill="#9CA3AF">⋮</text>
  <text x="165" y="164" text-anchor="middle" font-size="16" fill="#9CA3AF">⋮</text>
  <text x="263" y="164" text-anchor="middle" font-size="16" fill="#9CA3AF">⋮</text>

  <!-- Token last (mat) -->
  <rect x="28" y="174" width="80" height="28" rx="5" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="68" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#1D4ED8">mat [d=512]</text>
  <line x1="108" y1="188" x2="126" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="128" y="174" width="74" height="28" rx="5" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="165" y="192" text-anchor="middle" font-size="10" fill="#78350F">FFN(·)</text>
  <line x1="202" y1="188" x2="220" y2="188" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="222" y="174" width="82" height="28" rx="5" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="263" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">mat' [d=512]</text>

  <!-- Important note: tokens don't mix in FFN -->
  <rect x="28" y="218" width="276" height="48" rx="6" fill="#FFF1F2" stroke="#FECDD3" stroke-width="1.5"/>
  <text x="166" y="236" text-anchor="middle" font-size="10" font-weight="600" fill="#9F1239">토큰 간 정보 혼합 없음</text>
  <text x="166" y="252" text-anchor="middle" font-size="9" fill="#BE123C">Attention은 "who"를 참고할지 결정</text>
  <text x="166" y="264" text-anchor="middle" font-size="9" fill="#BE123C">FFN은 각 토큰을 "어떻게" 변환할지 결정</text>

  <!-- Divider -->
  <line x1="320" y1="58" x2="320" y2="290" stroke="#E5E7EB" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Right: FFN inner structure -->
  <text x="590" y="66" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">FFN 내부 구조 (token 1개 기준)</text>

  <!-- x_i input -->
  <rect x="486" y="74" width="120" height="34" rx="7" fill="#DBEAFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="546" y="88" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">x_i</text>
  <text x="546" y="102" text-anchor="middle" font-size="8" fill="#3B82F6">(1, d_model=512)</text>

  <line x1="546" y1="108" x2="546" y2="130" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- W1 linear -->
  <rect x="466" y="132" width="160" height="40" rx="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="546" y="150" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Linear  (W₁, b₁)</text>
  <text x="546" y="165" text-anchor="middle" font-size="9" fill="#92400E">512 → 2048  (d_ff = 4 × d_model)</text>

  <line x1="546" y1="172" x2="546" y2="192" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- ReLU -->
  <rect x="486" y="194" width="120" height="34" rx="7" fill="#FDE68A" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="546" y="208" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">ReLU</text>
  <text x="546" y="222" text-anchor="middle" font-size="8" fill="#B45309">max(0, x)  음수 → 0</text>

  <line x1="546" y1="228" x2="546" y2="248" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- W2 linear -->
  <rect x="466" y="250" width="160" height="40" rx="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="2"/>
  <text x="546" y="268" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Linear  (W₂, b₂)</text>
  <text x="546" y="283" text-anchor="middle" font-size="9" fill="#92400E">2048 → 512  (d_model 복원)</text>

  <line x1="546" y1="290" x2="546" y2="310" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="486" y="312" width="120" height="34" rx="7" fill="#DCFCE7" stroke="#22C55E" stroke-width="1.5"/>
  <text x="546" y="328" text-anchor="middle" font-size="11" font-weight="600" fill="#166534">x_i'</text>
  <text x="546" y="342" text-anchor="middle" font-size="8" fill="#16A34A">(1, d_model=512)</text>

  <!-- Dimension annotation on the right -->
  <text x="650" y="148" font-size="9" fill="#9CA3AF">×  6seq = (6, 2048)</text>
  <text x="650" y="282" font-size="9" fill="#9CA3AF">× 6seq = (6, 512)</text>

  <!-- Bottom formula card -->
  <rect x="28" y="296" width="816" height="40" rx="7" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="430" y="314" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">FFN(x) = max(0,  x W₁ + b₁) W₂ + b₂</text>
  <text x="430" y="330" text-anchor="middle" font-size="9" fill="#92400E">W₁ ∈ ℝ^{512×2048},  W₂ ∈ ℝ^{2048×512}  |  각 Encoder Layer마다 별도의 W₁, W₂를 가진다</text>

  <text x="430" y="390" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
