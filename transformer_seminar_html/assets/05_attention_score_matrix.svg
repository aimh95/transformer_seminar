  <!-- Cell border lines (draw grid on top) -->
  <rect x="84" y="75" width="504" height="288" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <!-- Horizontal lines -->
  <line x1="84" y1="123" x2="588" y2="123" stroke="white" stroke-width="2"/>
  <line x1="84" y1="171" x2="588" y2="171" stroke="white" stroke-width="2"/>
  <line x1="84" y1="219" x2="588" y2="219" stroke="white" stroke-width="2"/>
  <line x1="84" y1="267" x2="588" y2="267" stroke="white" stroke-width="2"/>
  <line x1="84" y1="315" x2="588" y2="315" stroke="white" stroke-width="2"/>
  <!-- Vertical lines -->
  <line x1="156" y1="75" x2="156" y2="363" stroke="white" stroke-width="2"/>
  <line x1="228" y1="75" x2="228" y2="363" stroke="white" stroke-width="2"/>
  <line x1="300" y1="75" x2="300" y2="363" stroke="white" stroke-width="2"/>
