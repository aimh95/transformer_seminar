<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 565" width="740" height="565"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">

  <rect width="740" height="565" fill="#F8F9FB" rx="8"/>
  <text x="370" y="26" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Attention Score Matrix = QKᵀ</text>
  <text x="370" y="44" text-anchor="middle" font-size="10" fill="#6B7280">row = Query 위치 (무엇을 찾는가),  col = Key 위치 (무엇을 참고하는가)</text>

  <!-- Tokens: The, cat, is, on, the, mat -->
  <!-- Uniform grid: 6 cols × 72px starting at x=120, 6 rows × 52px starting at y=72 -->
  <!-- col left edges: 120,192,264,336,408,480 / col centers: 156,228,300,372,444,516 -->
  <!-- row top edges: 72,124,176,228,280,332 / row text-y: 103,155,207,259,311,363 -->

  <!-- Column headers (Key) -->
  <text x="370" y="62" text-anchor="middle" font-size="10" fill="#1D4ED8" font-weight="600">Key (j) →</text>
  <text x="156" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">The</text>
  <text x="228" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">cat</text>
  <text x="300" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">is</text>
  <text x="372" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">on</text>
  <text x="444" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">the</text>
  <text x="516" y="70" text-anchor="middle" font-size="10" font-weight="700" fill="#1D4ED8">mat</text>

  <!-- Row headers (Query) -->
  <text x="56" y="228" text-anchor="middle" font-size="10" fill="#DC2626" font-weight="600" transform="rotate(-90,56,228)">Query (i) ↓</text>
  <text x="80" y="103" text-anchor="end" font-size="10" font-weight="700" fill="#DC2626">The</text>
  <text x="80" y="155" text-anchor="end" font-size="10" font-weight="700" fill="#DC2626">cat</text>
  <text x="80" y="207" text-anchor="end" font-size="10" font-weight="700" fill="#DC2626">is</text>
  <text x="80" y="259" text-anchor="end" font-size="10" font-weight="700" fill="#DC2626">on</text>
  <text x="80" y="311" text-anchor="end" font-size="10" font-weight="700" fill="#DC2626">the</text>
  <text x="80" y="363" text-anchor="end" font-size="10" font-weight="700" fill="#DC2626">mat</text>

  <!-- ===== Score Matrix Cells (softmax 후 예시 값, 각 row 합 = 1.0) ===== -->
  <!-- Color: HIGH(≥0.35)=#1D4ED8 text=white, MED(0.15~0.34)=#93C5FD text=#1E3A8A, LOW(<0.15)=#DBEAFE text=#374151 -->

  <!-- Row 0: The (주로 자기 자신 + the(5)와 관계) -->
  <rect x="120" y="72" width="72" height="52" fill="#1D4ED8"/>
  <text x="156" y="103" text-anchor="middle" font-size="12" font-weight="700" fill="white">0.42</text>
  <rect x="192" y="72" width="72" height="52" fill="#DBEAFE"/>
  <text x="228" y="103" text-anchor="middle" font-size="12" fill="#374151">0.08</text>
  <rect x="264" y="72" width="72" height="52" fill="#DBEAFE"/>
  <text x="300" y="103" text-anchor="middle" font-size="12" fill="#374151">0.06</text>
  <rect x="336" y="72" width="72" height="52" fill="#DBEAFE"/>
  <text x="372" y="103" text-anchor="middle" font-size="12" fill="#374151">0.07</text>
  <rect x="408" y="72" width="72" height="52" fill="#93C5FD"/>
  <text x="444" y="103" text-anchor="middle" font-size="12" fill="#1E3A8A">0.28</text>
  <rect x="480" y="72" width="72" height="52" fill="#DBEAFE"/>
  <text x="516" y="103" text-anchor="middle" font-size="12" fill="#374151">0.09</text>

  <!-- Row 1: cat (자기 자신 + mat) -->
  <rect x="120" y="124" width="72" height="52" fill="#DBEAFE"/>
  <text x="156" y="155" text-anchor="middle" font-size="12" fill="#374151">0.07</text>
  <rect x="192" y="124" width="72" height="52" fill="#1D4ED8"/>
  <text x="228" y="155" text-anchor="middle" font-size="12" font-weight="700" fill="white">0.45</text>
  <rect x="264" y="124" width="72" height="52" fill="#DBEAFE"/>
  <text x="300" y="155" text-anchor="middle" font-size="12" fill="#374151">0.10</text>
  <rect x="336" y="124" width="72" height="52" fill="#DBEAFE"/>
  <text x="372" y="155" text-anchor="middle" font-size="12" fill="#374151">0.06</text>
  <rect x="408" y="124" width="72" height="52" fill="#DBEAFE"/>
  <text x="444" y="155" text-anchor="middle" font-size="12" fill="#374151">0.08</text>
  <rect x="480" y="124" width="72" height="52" fill="#93C5FD"/>
  <text x="516" y="155" text-anchor="middle" font-size="12" fill="#1E3A8A">0.24</text>

  <!-- Row 2: is -->
  <rect x="120" y="176" width="72" height="52" fill="#DBEAFE"/>
  <text x="156" y="207" text-anchor="middle" font-size="12" fill="#374151">0.08</text>
  <rect x="192" y="176" width="72" height="52" fill="#93C5FD"/>
  <text x="228" y="207" text-anchor="middle" font-size="12" fill="#1E3A8A">0.18</text>
  <rect x="264" y="176" width="72" height="52" fill="#1D4ED8"/>
  <text x="300" y="207" text-anchor="middle" font-size="12" font-weight="700" fill="white">0.40</text>
  <rect x="336" y="176" width="72" height="52" fill="#93C5FD"/>
  <text x="372" y="207" text-anchor="middle" font-size="12" fill="#1E3A8A">0.16</text>
  <rect x="408" y="176" width="72" height="52" fill="#DBEAFE"/>
  <text x="444" y="207" text-anchor="middle" font-size="12" fill="#374151">0.10</text>
  <rect x="480" y="176" width="72" height="52" fill="#DBEAFE"/>
  <text x="516" y="207" text-anchor="middle" font-size="12" fill="#374151">0.08</text>

  <!-- Row 3: on -->
  <rect x="120" y="228" width="72" height="52" fill="#DBEAFE"/>
  <text x="156" y="259" text-anchor="middle" font-size="12" fill="#374151">0.07</text>
  <rect x="192" y="228" width="72" height="52" fill="#DBEAFE"/>
  <text x="228" y="259" text-anchor="middle" font-size="12" fill="#374151">0.09</text>
  <rect x="264" y="228" width="72" height="52" fill="#93C5FD"/>
  <text x="300" y="259" text-anchor="middle" font-size="12" fill="#1E3A8A">0.20</text>
  <rect x="336" y="228" width="72" height="52" fill="#1D4ED8"/>
  <text x="372" y="259" text-anchor="middle" font-size="12" font-weight="700" fill="white">0.38</text>
  <rect x="408" y="228" width="72" height="52" fill="#DBEAFE"/>
  <text x="444" y="259" text-anchor="middle" font-size="12" fill="#374151">0.07</text>
  <rect x="480" y="228" width="72" height="52" fill="#93C5FD"/>
  <text x="516" y="259" text-anchor="middle" font-size="12" fill="#1E3A8A">0.19</text>

  <!-- Row 4: the -->
  <rect x="120" y="280" width="72" height="52" fill="#93C5FD"/>
  <text x="156" y="311" text-anchor="middle" font-size="12" fill="#1E3A8A">0.26</text>
  <rect x="192" y="280" width="72" height="52" fill="#DBEAFE"/>
  <text x="228" y="311" text-anchor="middle" font-size="12" fill="#374151">0.08</text>
  <rect x="264" y="280" width="72" height="52" fill="#DBEAFE"/>
  <text x="300" y="311" text-anchor="middle" font-size="12" fill="#374151">0.06</text>
  <rect x="336" y="280" width="72" height="52" fill="#DBEAFE"/>
  <text x="372" y="311" text-anchor="middle" font-size="12" fill="#374151">0.07</text>
  <rect x="408" y="280" width="72" height="52" fill="#1D4ED8"/>
  <text x="444" y="311" text-anchor="middle" font-size="12" font-weight="700" fill="white">0.36</text>
  <rect x="480" y="280" width="72" height="52" fill="#93C5FD"/>
  <text x="516" y="311" text-anchor="middle" font-size="12" fill="#1E3A8A">0.17</text>

  <!-- Row 5: mat (자기 자신 + cat) -->
  <rect x="120" y="332" width="72" height="52" fill="#DBEAFE"/>
  <text x="156" y="363" text-anchor="middle" font-size="12" fill="#374151">0.06</text>
  <rect x="192" y="332" width="72" height="52" fill="#93C5FD"/>
  <text x="228" y="363" text-anchor="middle" font-size="12" fill="#1E3A8A">0.22</text>
  <rect x="264" y="332" width="72" height="52" fill="#DBEAFE"/>
  <text x="300" y="363" text-anchor="middle" font-size="12" fill="#374151">0.08</text>
  <rect x="336" y="332" width="72" height="52" fill="#93C5FD"/>
  <text x="372" y="363" text-anchor="middle" font-size="12" fill="#1E3A8A">0.15</text>
  <rect x="408" y="332" width="72" height="52" fill="#DBEAFE"/>
  <text x="444" y="363" text-anchor="middle" font-size="12" fill="#374151">0.08</text>
  <rect x="480" y="332" width="72" height="52" fill="#1D4ED8"/>
  <text x="516" y="363" text-anchor="middle" font-size="12" font-weight="700" fill="white">0.41</text>

  <!-- Grid border + divider lines (drawn on top, between cells only — never through text) -->
  <rect x="120" y="72" width="432" height="312" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="120" y1="124" x2="552" y2="124" stroke="white" stroke-width="2"/>
  <line x1="120" y1="176" x2="552" y2="176" stroke="white" stroke-width="2"/>
  <line x1="120" y1="228" x2="552" y2="228" stroke="white" stroke-width="2"/>
  <line x1="120" y1="280" x2="552" y2="280" stroke="white" stroke-width="2"/>
  <line x1="120" y1="332" x2="552" y2="332" stroke="white" stroke-width="2"/>
  <line x1="192" y1="72" x2="192" y2="384" stroke="white" stroke-width="2"/>
  <line x1="264" y1="72" x2="264" y2="384" stroke="white" stroke-width="2"/>
  <line x1="336" y1="72" x2="336" y2="384" stroke="white" stroke-width="2"/>
  <line x1="408" y1="72" x2="408" y2="384" stroke="white" stroke-width="2"/>
  <line x1="480" y1="72" x2="480" y2="384" stroke="white" stroke-width="2"/>

  <!-- Legend -->
  <rect x="84" y="395" width="20" height="14" rx="2" fill="#1D4ED8"/>
  <text x="112" y="407" font-size="10" fill="#374151">높은 attention (≥ 0.35)</text>
  <rect x="270" y="395" width="20" height="14" rx="2" fill="#93C5FD"/>
  <text x="298" y="407" font-size="10" fill="#374151">중간 attention</text>
  <rect x="420" y="395" width="20" height="14" rx="2" fill="#DBEAFE"/>
  <text x="448" y="407" font-size="10" fill="#374151">낮은 attention</text>

  <!-- Annotation -->
  <text x="370" y="427" text-anchor="middle" font-size="10" fill="#374151">각 row의 값은 softmax 이후라 합이 1.0  |  값은 설명을 위한 예시 (학습된 실제 값은 다름)</text>

  <!-- score_ij formula -->
  <rect x="84" y="437" width="554" height="32" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="361" y="457" text-anchor="middle" font-size="11" fill="#78350F" font-weight="600">score[i][j] = q_i · k_j  →  i번째 Query가 j번째 Key를 얼마나 "검색했는지" 나타낸다</text>

  <text x="370" y="551" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
