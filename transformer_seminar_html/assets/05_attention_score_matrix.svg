  <rect x="84" y="171" width="72" height="48" rx="0" fill="#DBEAFE"/>
  <text x="120" y="198" text-anchor="middle" font-size="12" fill="#374151">0.08</text>

  <rect x="156" y="171" width="72" height="48" rx="0" fill="#93C5FD"/>
  <text x="192" y="198" text-anchor="middle" font-size="12" fill="#1E3A8A">0.18</text>

