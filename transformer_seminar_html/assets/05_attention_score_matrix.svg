  <line x1="516" y1="75" x2="516" y2="363" stroke="white" stroke-width="2"/>

  <!-- Legend -->
  <rect x="84" y="374" width="20" height="14" rx="2" fill="#1D4ED8"/>
  <text x="112" y="386" font-size="10" fill="#374151">높은 attention (≥ 0.35)</text>
  <rect x="270" y="374" width="20" height="14" rx="2" fill="#93C5FD"/>
  <text x="298" y="386" font-size="10" fill="#374151">중간 attention</text>
  <rect x="420" y="374" width="20" height="14" rx="2" fill="#DBEAFE"/>
  <text x="448" y="386" font-size="10" fill="#374151">낮은 attention</text>

  <!-- Annotation -->
  <text x="370" y="406" text-anchor="middle" font-size="10" fill="#374151">각 row의 값은 softmax 이후라 합이 1.0  |  값은 설명을 위한 예시 (학습된 실제 값은 다름)</text>

  <!-- score_ij formula -->
  <rect x="84" y="416" width="554" height="32" rx="6" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="361" y="436" text-anchor="middle" font-size="11" fill="#78350F" font-weight="600">score[i][j] = q_i · k_j  →  i번째 Query가 j번째 Key를 얼마나 "검색했는지" 나타낸다</text>

  <text x="370" y="526" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
