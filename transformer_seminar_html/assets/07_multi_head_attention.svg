<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#374151"/>
    </marker>
  </defs>

  <rect width="860" height="440" fill="#F8F9FB" rx="8"/>
  <text x="430" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Multi-Head Attention 구조</text>
  <text x="430" y="42" text-anchor="middle" font-size="10" fill="#6B7280">d_model 차원을 h개의 head로 분할 → 각각 독립적으로 Attention 계산 → Concat → 선형 변환</text>

  <!-- Input X -->
  <rect x="354" y="56" width="152" height="36" rx="7" fill="#FFFFFF" stroke="#374151" stroke-width="2"/>
  <text x="430" y="79" text-anchor="middle" font-size="12" font-weight="600" fill="#374151">X (Q, K, V)</text>

  <!-- Fan out to 3 heads (simplified, representing h=8) -->
  <line x1="430" y1="92" x2="430" y2="106" stroke="#374151" stroke-width="1.5"/>
  <line x1="430" y1="106" x2="140" y2="106" stroke="#374151" stroke-width="1"/>
  <line x1="430" y1="106" x2="430" y2="106" stroke="#374151" stroke-width="1"/>
  <line x1="430" y1="106" x2="720" y2="106" stroke="#374151" stroke-width="1"/>
  <line x1="140" y1="106" x2="140" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="430" y1="106" x2="430" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="106" x2="720" y2="120" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Head 1 (left) -->
  <rect x="50" y="122" width="180" height="56" rx="7" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="140" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A">Head 1</text>
  <text x="140" y="159" text-anchor="middle" font-size="9" fill="#1D4ED8">W₁^Q, W₁^K, W₁^V</text>
  <text x="140" y="171" text-anchor="middle" font-size="8" fill="#3B82F6">→ d_k = 64 차원</text>

  <!-- Head 2 (middle) -->
  <rect x="340" y="122" width="180" height="56" rx="7" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="430" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A">Head 2</text>
  <text x="430" y="159" text-anchor="middle" font-size="9" fill="#1D4ED8">W₂^Q, W₂^K, W₂^V</text>
  <text x="430" y="171" text-anchor="middle" font-size="8" fill="#3B82F6">→ d_k = 64 차원</text>

  <!-- Head h (right, "..." implied) -->
  <rect x="630" y="122" width="180" height="56" rx="7" fill="#BFDBFE" stroke="#3B82F6" stroke-width="1.5"/>
  <text x="720" y="143" text-anchor="middle" font-size="11" font-weight="700" fill="#1E3A8A">Head 8</text>
  <text x="720" y="159" text-anchor="middle" font-size="9" fill="#1D4ED8">W₈^Q, W₈^K, W₈^V</text>
  <text x="720" y="171" text-anchor="middle" font-size="8" fill="#3B82F6">→ d_k = 64 차원</text>

  <!-- "..." between head 2 and head h -->
  <text x="555" y="154" text-anchor="middle" font-size="18" fill="#9CA3AF">···</text>

  <!-- Attention output per head -->
  <line x1="140" y1="178" x2="140" y2="200" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="430" y1="178" x2="430" y2="200" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="720" y1="178" x2="720" y2="200" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Attention result per head -->
  <rect x="62" y="202" width="156" height="40" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="140" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">head₁</text>
  <text x="140" y="232" text-anchor="middle" font-size="8" fill="#16A34A">(seq_len, 64)</text>

  <rect x="352" y="202" width="156" height="40" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="430" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">head₂</text>
  <text x="430" y="232" text-anchor="middle" font-size="8" fill="#16A34A">(seq_len, 64)</text>

  <rect x="642" y="202" width="156" height="40" rx="6" fill="#DCFCE7" stroke="#86EFAC" stroke-width="1.5"/>
  <text x="720" y="218" text-anchor="middle" font-size="10" font-weight="600" fill="#166534">head₈</text>
  <text x="720" y="232" text-anchor="middle" font-size="8" fill="#16A34A">(seq_len, 64)</text>

  <text x="555" y="228" text-anchor="middle" font-size="18" fill="#9CA3AF">···</text>

  <!-- Concat arrows -->
  <line x1="140" y1="242" x2="140" y2="262" stroke="#374151" stroke-width="1.5"/>
  <line x1="430" y1="242" x2="430" y2="262" stroke="#374151" stroke-width="1.5"/>
  <line x1="720" y1="242" x2="720" y2="262" stroke="#374151" stroke-width="1.5"/>
  <line x1="140" y1="262" x2="720" y2="262" stroke="#374151" stroke-width="1.5"/>
  <line x1="430" y1="262" x2="430" y2="282" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Concat label -->
  <text x="430" y="276" text-anchor="middle" font-size="9" fill="#374151">Concat: (seq_len, 8×64) = (seq_len, 512)</text>

  <!-- Concat box -->
  <rect x="270" y="284" width="320" height="38" rx="7" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="1.5"/>
  <text x="430" y="301" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">Concat(head₁, ..., head₈)</text>
  <text x="430" y="316" text-anchor="middle" font-size="9" fill="#6B7280">(seq_len, d_model=512)</text>

  <!-- Arrow -->
  <line x1="430" y1="322" x2="430" y2="342" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="440" y="336" font-size="9" fill="#9CA3AF">W^O ∈ ℝ^{512×512}</text>

  <!-- W^O projection -->
  <rect x="280" y="344" width="300" height="38" rx="7" fill="#FEF3C7" stroke="#F59E0B" stroke-width="1.5"/>
  <text x="430" y="361" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Linear (W^O)</text>
  <text x="430" y="376" text-anchor="middle" font-size="9" fill="#92400E">512 → 512  (d_model 유지)</text>

  <!-- Arrow -->
  <line x1="430" y1="382" x2="430" y2="400" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output -->
  <rect x="300" y="402" width="260" height="32" rx="7" fill="#EFF6FF" stroke="#2563EB" stroke-width="2"/>
  <text x="430" y="418" text-anchor="middle" font-size="11" font-weight="600" fill="#1D4ED8">MultiHead Output (seq_len, 512)</text>
  <text x="430" y="430" text-anchor="middle" font-size="8" fill="#3B82F6">→ Add &amp; Norm으로 이어짐</text>

  <text x="430" y="432" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic"></text>
  <text x="430" y="435" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
