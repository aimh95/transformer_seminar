<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460"
     font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#374151"/>
    </marker>
    <marker id="arr-r" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#DC2626"/>
    </marker>
    <marker id="arr-b" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#1D4ED8"/>
    </marker>
    <marker id="arr-g" markerWidth="7" markerHeight="6" refX="6" refY="3" orient="auto">
      <polygon points="0 0, 7 3, 0 6" fill="#16A34A"/>
    </marker>
  </defs>

  <rect width="860" height="460" fill="#F8F9FB" rx="8"/>
  <text x="430" y="24" text-anchor="middle" font-size="13" font-weight="700" fill="#111827">Cross-Attention: Decoder가 Encoder 출력을 참고하는 방법</text>
  <text x="430" y="42" text-anchor="middle" font-size="10" fill="#6B7280">Q ← Decoder,  K와 V ← Encoder (H_enc)  |  원본 문장과의 연결</text>

  <!-- Encoder block -->
  <rect x="24" y="56" width="340" height="180" rx="10" fill="#EFF6FF" stroke="#3B82F6" stroke-width="2"/>
  <text x="194" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#1D4ED8">Encoder 출력 (H_enc)</text>
  <text x="194" y="96" text-anchor="middle" font-size="9" fill="#3B82F6">shape: (src_len=6, d_model=512)</text>

  <!-- Encoder tokens as rows -->
  <rect x="44" y="104" width="300" height="22" rx="4" fill="#BFDBFE"/>
  <text x="94" y="119" text-anchor="middle" font-size="9" fill="#1E3A8A">h[The]</text>
  <text x="194" y="119" text-anchor="middle" font-size="9" fill="#1E3A8A">→ 원본 문장 모든 토큰의 정보</text>

  <rect x="44" y="130" width="300" height="22" rx="4" fill="#BFDBFE" opacity="0.8"/>
  <text x="94" y="145" text-anchor="middle" font-size="9" fill="#1E3A8A">h[cat]</text>
  <rect x="44" y="156" width="300" height="22" rx="4" fill="#BFDBFE" opacity="0.6"/>
  <text x="94" y="171" text-anchor="middle" font-size="9" fill="#1E3A8A">h[is]</text>
  <rect x="44" y="182" width="300" height="22" rx="4" fill="#BFDBFE" opacity="0.4"/>
  <text x="94" y="197" text-anchor="middle" font-size="9" fill="#1E3A8A">h[on]</text>
  <text x="194" y="197" text-anchor="middle" font-size="9" fill="#6B7280">... (6 rows)</text>

  <!-- H_enc → W^K, W^V -->
  <line x1="364" y1="145" x2="420" y2="145" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="392" y="139" text-anchor="middle" font-size="8" fill="#374151">H_enc</text>

  <!-- W^K box -->
  <rect x="422" y="106" width="90" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="467" y="123" text-anchor="middle" font-size="13" font-weight="700" fill="#1D4ED8">W^K</text>
  <text x="467" y="138" text-anchor="middle" font-size="8" fill="#3B82F6">(512×64)</text>

  <!-- W^V box -->
  <rect x="422" y="154" width="90" height="38" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="467" y="171" text-anchor="middle" font-size="13" font-weight="700" fill="#16A34A">W^V</text>
  <text x="467" y="186" text-anchor="middle" font-size="8" fill="#22C55E">(512×64)</text>

  <!-- K output -->
  <line x1="512" y1="125" x2="550" y2="125" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#arr-b)"/>
  <rect x="552" y="106" width="70" height="38" rx="6" fill="#EFF6FF" stroke="#93C5FD" stroke-width="2"/>
  <text x="587" y="123" text-anchor="middle" font-size="14" font-weight="800" fill="#1D4ED8">K</text>
  <text x="587" y="138" text-anchor="middle" font-size="8" fill="#3B82F6">(6, 64)</text>

  <!-- V output -->
  <line x1="512" y1="173" x2="550" y2="173" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr-g)"/>
  <rect x="552" y="154" width="70" height="38" rx="6" fill="#F0FDF4" stroke="#86EFAC" stroke-width="2"/>
  <text x="587" y="171" text-anchor="middle" font-size="14" font-weight="800" fill="#16A34A">V</text>
  <text x="587" y="186" text-anchor="middle" font-size="8" fill="#22C55E">(6, 64)</text>

  <!-- Decoder block -->
  <rect x="24" y="264" width="340" height="120" rx="10" fill="#F5F3FF" stroke="#7C3AED" stroke-width="2"/>
  <text x="194" y="286" text-anchor="middle" font-size="12" font-weight="700" fill="#7C3AED">Decoder Hidden State</text>
  <text x="194" y="302" text-anchor="middle" font-size="9" fill="#5B21B6">Masked Self-Attn 이후 출력</text>
  <text x="194" y="320" text-anchor="middle" font-size="9" fill="#6B7280">shape: (tgt_len=4, d_model=512)</text>

  <rect x="44" y="330" width="300" height="20" rx="4" fill="#C4B5FD"/>
  <text x="94" y="344" text-anchor="middle" font-size="9" fill="#4C1D95">s[&lt;SOS&gt;]</text>
  <text x="194" y="344" text-anchor="middle" font-size="9" fill="#5B21B6">현재까지 생성된 번역 정보</text>
  <rect x="44" y="354" width="300" height="20" rx="4" fill="#C4B5FD" opacity="0.7"/>
  <text x="94" y="368" text-anchor="middle" font-size="9" fill="#4C1D95">s[Le]  ...</text>

  <!-- Decoder → W^Q -->
  <line x1="364" y1="324" x2="420" y2="230" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="382" y="265" font-size="8" fill="#374151">hidden</text>

  <!-- W^Q box -->
  <rect x="422" y="208" width="90" height="38" rx="6" fill="#FEF2F2" stroke="#FECACA" stroke-width="2"/>
  <text x="467" y="225" text-anchor="middle" font-size="13" font-weight="700" fill="#DC2626">W^Q</text>
  <text x="467" y="240" text-anchor="middle" font-size="8" fill="#EF4444">(512×64)</text>

  <!-- Q output -->
  <line x1="512" y1="227" x2="550" y2="227" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arr-r)"/>
  <rect x="552" y="208" width="70" height="38" rx="6" fill="#FEF2F2" stroke="#FCA5A5" stroke-width="2"/>
  <text x="587" y="225" text-anchor="middle" font-size="14" font-weight="800" fill="#DC2626">Q</text>
  <text x="587" y="240" text-anchor="middle" font-size="8" fill="#EF4444">(4, 64)</text>

  <!-- Attention box (center) -->
  <rect x="650" y="106" width="190" height="180" rx="10" fill="#F9FAFB" stroke="#D1D5DB" stroke-width="2"/>
  <text x="745" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Scaled Dot-Product</text>
  <text x="745" y="144" text-anchor="middle" font-size="11" font-weight="700" fill="#374151">Attention</text>
  <line x1="660" y1="152" x2="830" y2="152" stroke="#E5E7EB" stroke-width="1"/>
  <text x="745" y="172" text-anchor="middle" font-size="10" fill="#374151">softmax(QKᵀ/√d_k)</text>
  <text x="745" y="190" text-anchor="middle" font-size="10" fill="#374151">· V</text>
  <line x1="660" y1="202" x2="830" y2="202" stroke="#E5E7EB" stroke-width="1"/>
  <text x="745" y="220" text-anchor="middle" font-size="9" fill="#6B7280">Score[i][j] =</text>
  <text x="745" y="234" text-anchor="middle" font-size="9" fill="#6B7280">q_i (Decoder) ·</text>
  <text x="745" y="248" text-anchor="middle" font-size="9" fill="#6B7280">k_j (Encoder)</text>
  <text x="745" y="268" text-anchor="middle" font-size="8" fill="#9CA3AF">출력: (4, 64)</text>

  <!-- Q, K, V arrows into Attention box -->
  <line x1="622" y1="125" x2="648" y2="145" stroke="#1D4ED8" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="622" y1="173" x2="648" y2="173" stroke="#16A34A" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="622" y1="227" x2="648" y2="215" stroke="#DC2626" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Output from Attention -->
  <line x1="745" y1="286" x2="745" y2="322" stroke="#374151" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Cross-Attn output -->
  <rect x="630" y="324" width="220" height="52" rx="8" fill="#EDE9FE" stroke="#7C3AED" stroke-width="2"/>
  <text x="740" y="346" text-anchor="middle" font-size="11" font-weight="600" fill="#5B21B6">Cross-Attn 출력</text>
  <text x="740" y="362" text-anchor="middle" font-size="9" fill="#6B7280">(tgt_len=4, d_model=512)</text>
  <text x="740" y="374" text-anchor="middle" font-size="8" fill="#7C3AED">Decoder 각 토큰이 Source를</text>

  <!-- Annotation: intuition -->
  <rect x="24" y="400" width="816" height="48" rx="8" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.5"/>
  <text x="430" y="420" text-anchor="middle" font-size="11" font-weight="600" fill="#78350F">Cross-Attention 직관</text>
  <text x="430" y="438" text-anchor="middle" font-size="10" fill="#92400E">"Le"를 생성할 때, Decoder의 Q가 Encoder의 K에 점수를 매긴다 → "The", "cat"에 높은 weight → V를 가중합 → "The cat"의 의미를 흡수</text>
  <text x="430" y="452" text-anchor="middle" font-size="9" fill="#9CA3AF" font-style="italic">Redrawn based on "Attention Is All You Need", Vaswani et al., 2017.</text>
</svg>
